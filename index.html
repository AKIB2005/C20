<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>p5.play Physics Demo</title>
  <link rel="stylesheet" href="style.css" />

  <!-- p5.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>

  <!-- Matter.js (physics engine used by p5.play) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

  <!-- p5.play v3 (requires p5 + Matter.js loaded first) -->
  <script src="https://p5play.org/v3/p5play.js"></script>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="instructions">
    🖱️ <strong>Click</strong> to drop a ball &nbsp;|&nbsp;
    ⌨️ <strong>Space</strong> to shake &nbsp;|&nbsp;
    🔢 <strong>1–3</strong> to change shape
  </div>
  <script src="sketch.js"></script>
</body>
</html>
